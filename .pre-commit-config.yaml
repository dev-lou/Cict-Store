repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.6.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.0.0
    hooks:
      - id: eslint
        stages: [commit]

# To install: pip install pre-commit detect-secrets
# Then run: pre-commit install && detect-secrets scan > .secrets.baseline
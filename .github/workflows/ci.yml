name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-php:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2
      - name: Ensure writable cache directory
        run: mkdir -p bootstrap/cache
      - run: composer install --no-progress --prefer-dist
      - run: vendor/bin/pint --test

  test:
    name: PHPUnit
    needs: lint-php
    if: success()
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: test
      DB_USERNAME: test
      DB_PASSWORD: test
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2
          coverage: none
      - name: Ensure writable cache directory
        run: mkdir -p bootstrap/cache
      - name: Create .env.testing for CI
        run: |
          cat > .env.testing << EOF
          APP_ENV=testing
          DB_CONNECTION=pgsql
          DB_HOST=localhost
          DB_PORT=5432
          DB_DATABASE=test
          DB_USERNAME=test
          DB_PASSWORD=test
          SESSION_DRIVER=file
          CACHE_STORE=file
          EOF
      - run: composer install --no-progress --prefer-dist
      - run: php artisan key:generate --ansi
      - run: php artisan migrate --force
      - run: php artisan test --no-coverage

  build:
    name: Frontend Build
    needs: lint-php
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: mkdir -p bootstrap/cache
      - run: cp .env.example .env
      - run: npm ci
      - run: npm run build
